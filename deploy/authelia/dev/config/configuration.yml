---
# Authelia config for BrokerAI LOCAL DEVELOPMENT ONLY.
# Started by: ./scripts/dev.sh --oidc

theme: dark

server:
  address: 'tcp://:9091'

log:
  level: info

identity_validation:
  reset_password:
    jwt_secret: dev-local-authelia-jwt-secret-32c

authentication_backend:
  file:
    path: /config/users_database.yml

access_control:
  default_policy: deny
  rules:
    - domain: 'localhost'
      policy: one_factor
    - domain: '127.0.0.1'
      policy: one_factor

session:
  secret: dev-local-authelia-session-secret
  cookies:
    - domain: 'localhost'
      authelia_url: 'http://localhost:9091'

storage:
  encryption_key: dev-local-authelia-storage-key-32chars
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt

